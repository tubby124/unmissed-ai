<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>D445 Staged Test — Windshield Hub</title>
<style>
  body { font: 14px -apple-system, system-ui, sans-serif; max-width: 720px; margin: 24px auto; padding: 0 16px; background: #0a0a0a; color: #e8e8e8; }
  h1 { font-size: 18px; margin: 0 0 4px; }
  .meta { color: #888; font-size: 12px; margin-bottom: 16px; }
  .panel { background: #141414; border: 1px solid #2a2a2a; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  label { display: block; font-size: 12px; color: #aaa; margin-bottom: 4px; }
  input { width: 100%; box-sizing: border-box; padding: 8px 10px; background: #0a0a0a; border: 1px solid #333; border-radius: 6px; color: #e8e8e8; font: 12px monospace; }
  button { padding: 10px 16px; border: 0; border-radius: 6px; font: 600 13px system-ui; cursor: pointer; }
  button.primary { background: #4f9cf9; color: white; }
  button.danger  { background: #c44; color: white; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .row { display: flex; gap: 8px; align-items: end; }
  .status { padding: 8px 12px; border-radius: 6px; background: #1a1a1a; border-left: 3px solid #4f9cf9; font-size: 12px; }
  .status.error { border-color: #c44; }
  .status.active { border-color: #4ade80; }
  .transcript { font-size: 13px; height: 320px; overflow-y: auto; padding: 12px; background: #0a0a0a; border: 1px solid #2a2a2a; border-radius: 6px; }
  .turn { padding: 6px 0; border-bottom: 1px solid #1a1a1a; }
  .turn.user { color: #f9c74f; }
  .turn.agent { color: #90e0ef; }
  .turn .role { font-size: 10px; text-transform: uppercase; opacity: 0.6; margin-right: 6px; }
</style>
</head>
<body>
  <h1>D445 Staged Prompt Test</h1>
  <p class="meta">Browser WebRTC harness. Talks to Mark's staged 14,526-char slot prompt via your Ultravox API key. Production untouched.</p>

  <div class="panel">
    <label>joinUrl (auto-filled from query param `?joinUrl=...`)</label>
    <div class="row">
      <input id="joinUrlInput" placeholder="wss://voice.ultravox.ai/calls/&lt;callId&gt;" />
      <button id="joinBtn" class="primary">Join</button>
      <button id="endBtn" class="danger" disabled>End</button>
    </div>
  </div>

  <div id="status" class="status">idle — paste joinUrl and click Join</div>

  <div class="panel">
    <label>Transcript (live)</label>
    <div id="transcript" class="transcript"></div>
  </div>

<script type="module">
import { UltravoxSession } from 'https://esm.sh/ultravox-client@0.5.0'

const $ = (id) => document.getElementById(id)
const joinUrlInput = $('joinUrlInput')
const joinBtn = $('joinBtn')
const endBtn = $('endBtn')
const statusEl = $('status')
const transcriptEl = $('transcript')

// Auto-fill joinUrl from URL query param
const params = new URLSearchParams(location.search)
const queryJoinUrl = params.get('joinUrl')
if (queryJoinUrl) joinUrlInput.value = queryJoinUrl

let session = null

function setStatus(msg, klass) {
  statusEl.textContent = msg
  statusEl.className = 'status' + (klass ? ' ' + klass : '')
}

function appendTurn(role, text) {
  const div = document.createElement('div')
  div.className = 'turn ' + role
  const r = document.createElement('span')
  r.className = 'role'
  r.textContent = role
  div.appendChild(r)
  div.appendChild(document.createTextNode(text))
  transcriptEl.appendChild(div)
  transcriptEl.scrollTop = transcriptEl.scrollHeight
}

joinBtn.addEventListener('click', async () => {
  const url = joinUrlInput.value.trim()
  if (!url) return setStatus('joinUrl required', 'error')
  try {
    setStatus('requesting mic...', null)
    session = new UltravoxSession()
    session.addEventListener('status', () => {
      setStatus('status: ' + session.status, session.status === 'idle' ? null : 'active')
    })
    session.addEventListener('transcripts', () => {
      transcriptEl.innerHTML = ''
      for (const t of session.transcripts) {
        appendTurn(t.speaker || (t.role === 'agent' ? 'agent' : 'user'), t.text || '')
      }
    })
    await session.joinCall(url)
    setStatus('connected — speak naturally', 'active')
    joinBtn.disabled = true
    endBtn.disabled = false
  } catch (err) {
    setStatus('failed: ' + err.message, 'error')
    console.error(err)
  }
})

endBtn.addEventListener('click', async () => {
  if (session) {
    try { await session.leaveCall() } catch (e) { /* ignore */ }
    session = null
  }
  setStatus('ended', null)
  joinBtn.disabled = false
  endBtn.disabled = true
})

// Auto-join if joinUrl was passed as query param
if (queryJoinUrl) {
  setTimeout(() => joinBtn.click(), 250)
}
</script>
</body>
</html>
